name: Azure Template Validation
on:
  workflow_dispatch:
  push: 
    branches: 
    - main 

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  template_validation_job:
    runs-on: ubuntu-latest
    # environment: production  # Removed - using branch-based federation instead
    name: Template validation

    steps:
      # Step 1: Checkout the code from your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Lint JSON files for formatting issues
      - name: Lint JSON files
        run: |
          npm install -g jsonlint
          echo "Validating JSON files in infra/..."
          for file in infra/*.json; do
            echo "Checking $file"
            jsonlint -q "$file"
          done
          echo "All JSON files are valid"

      # Step 3: Validate the Azure template using microsoft/template-validation-action
      - name: Validate Azure Template
        uses: microsoft/template-validation-action@v0.4.3
        id: validation
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: ${{ secrets.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ secrets.AZURE_LOCATION }}
          AZURE_ENV_AI_DEPLOYMENTS_LOCATION: ${{ secrets.AZURE_ENV_AI_DEPLOYMENTS_LOCATION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYING_USER_PRINCIPAL_TYPE: ServicePrincipal

      # Step 4: Print the result of the validation
      - name: Print result
        run: cat ${{ steps.validation.outputs.resultFile }}
